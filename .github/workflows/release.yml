name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semver tag to release, for example v0.5.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            git fetch --tags --force
            git checkout "${TAG}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use semver format vX.Y.Z. Got: ${TAG}" >&2
            exit 1
          fi

          TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
          git fetch origin main:refs/remotes/origin/main --force
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "Release tag ${TAG} must point to a commit reachable from origin/main." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "tag_commit=${TAG_COMMIT}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release candidate
        run: npm run verify

      - name: Extract changelog notes
        id: changelog
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          node scripts/extract-release-notes.mjs "${RELEASE_TAG}" --output release-notes.md --github-output "${GITHUB_OUTPUT}"

      - name: Create release from changelog
        if: ${{ steps.changelog.outputs.found == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" \
            --title "Panely ${RELEASE_TAG}" \
            --notes-file release-notes.md

      - name: Create release with generated notes fallback
        if: ${{ steps.changelog.outputs.found != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" \
            --title "Panely ${RELEASE_TAG}" \
            --generate-notes
